services:
  api-1:
    build: .
    command: ["bun", "run", "src/api.ts"]
    environment:
      - API_SOCKET=/var/run/rinha/api1.sock
      - SEARCH_STRATEGY=S5
    volumes:
      - socket-dir:/var/run/rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: 167MB

  api-2:
    build: .
    command: ["bun", "run", "src/api.ts"]
    environment:
      - API_SOCKET=/var/run/rinha/api2.sock
      - SEARCH_STRATEGY=S5
    volumes:
      - socket-dir:/var/run/rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: 167MB

  lb:
    image: haproxy:3.0-alpine
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - socket-dir:/var/run/rinha
    command: ["haproxy", "-f", "/usr/local/etc/haproxy/haproxy.cfg", "-db"]
    ports:
      - "9999:9999"
    depends_on:
      - api-1
      - api-2
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 15MB

volumes:
  socket-dir:
    driver_opts:
      type: tmpfs
      device: tmpfs