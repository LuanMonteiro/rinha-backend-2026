# Diagnostic-only compose override for direct API benchmarking/debugging.
# Not part of submission topology; use only with submission/docker-compose.yml via:
#   docker compose -f submission/docker-compose.yml -f experiments/docker-compose.direct-api.yml up
services:
  api-1:
    environment:
      API_SOCKET: "" # clear Unix socket binding from base compose
      BACKEND_PORT: "9998"
    ports:
      - "9998:9998"

  api-2:
    environment:
      API_SOCKET: "" # clear Unix socket binding from base compose
      BACKEND_PORT: "9997"
    ports:
      - "9997:9997"
